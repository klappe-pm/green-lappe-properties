# schema.yaml
# Effort 0 - Geographic Foundation
# Author: GIS analyst (Claude Opus 4.7, 2026-05-18)
# All CSVs documented here. Column type, unit, vintage, source per column.

zip-master.csv:
  primary_key: zcta
  description: >
    Canonical ZIP universe for King and Snohomish Counties, WA. One row per
    ZCTA with at least 10% land area in either county (in_scope_primary=true).
    Edge ZCTAs below the 10% threshold are flagged in_scope_primary=false but
    kept in the file with reason.
  columns:
    zcta:
      type: string
      length: 5
      description: 5-digit ZIP Code Tabulation Area, Census 2020 vintage.
      source: US Census TIGER/Line 2020 ZCTA5
      vintage: 2020
    postal_zips:
      type: string
      format: semicolon-separated 5-digit codes
      description: USPS postal ZIPs that route into this ZCTA. In most cases identical to zcta; ZCTAs can absorb adjacent PO-Box-only ZIPs.
      source: HUD USPS ZIP-ZCTA crosswalk Q4 2024 (TODO refresh) and Census 2020 relationship file
      vintage: 2024
    county_primary:
      type: enum
      values: [King, Snohomish]
      description: County with the largest land share of the ZCTA.
      source: Census 2020 ZCTA-to-County relationship file
    county_secondary:
      type: string
      description: Second county for cross-county ZCTAs. Blank otherwise. Pierce / King / Snohomish / Kittitas / Chelan possible.
      source: Census 2020 ZCTA-to-County relationship file
    pct_land_king:
      type: float
      range: 0.00-1.00
      description: Fraction of ZCTA land area inside King County (FIPS 53033).
      source: Census 2020 ZCTA-to-County relationship file (AREALAND_PART / AREALAND)
      vintage: 2020
      note: MODELED in this deliverable from county-of-record + cross-county research; awaiting direct ZCTA-County relationship file ingest.
    pct_land_snohomish:
      type: float
      range: 0.00-1.00
      description: Fraction of ZCTA land area inside Snohomish County (FIPS 53061).
      source: Census 2020 ZCTA-to-County relationship file
      vintage: 2020
      note: MODELED in this deliverable; same caveat as pct_land_king.
    cities:
      type: string
      format: semicolon-separated city names
      description: All incorporated cities and Census Designated Places intersecting the ZCTA.
      source: Census 2020 ZCTA-to-Place relationship file
    city_primary:
      type: string
      description: City with the largest land share inside the ZCTA. May be "Unincorporated King" or "Unincorporated Snohomish".
      source: Census 2020 ZCTA-to-Place + County GIS
    school_districts:
      type: string
      format: semicolon-separated district names
      description: All Washington school districts whose boundary intersects the ZCTA.
      source: WA OSPI district boundaries 2024-25, NCES district boundaries
      vintage: 2024-25
    unincorporated_share:
      type: float
      range: 0.00-1.00
      description: Fraction of ZCTA land area outside any incorporated city limits.
      source: County GIS clip of incorporated city boundaries vs ZCTA polygon
      note: MODELED for now; precise values require GIS overlay in post-processing.
    classification:
      type: enum
      values: [urban-core, urban, suburban, exurban, rural]
      description: >
        urban-core: dense mixed-use Seattle CBD/Belltown/SLU/Downtown Bellevue
        urban: dense neighborhoods inside large city limits (Seattle ex-CBD, downtown Bellevue/Redmond/Kirkland city centers)
        suburban: low-rise residential dominant inside or adjacent to large cities
        exurban: small incorporated cities or low-density unincorporated with commute orientation
        rural: agriculture/forest dominant, low density, long distance from urban core
      methodology: See effort-0-narrative.md section "Classification methodology".
    population_2014:
      type: integer
      description: ZCTA population, 2014. ACS 5-year 2010-2014 B01003 estimate when available.
      source: ACS 5-year 2010-2014 B01003 (TODO direct API pull)
      vintage: 2014
    population_2024:
      type: integer
      description: ZCTA population. Where direct ACS 5-year 2019-2023 B01003 is not retrieved in session, uses World Population Review derived from ACS 2023 vintage as proxy.
      source: ACS 5-year 2019-2023 B01003 (TODO direct API pull); World Population Review 2024 published from ACS used as PUBLIC-PROXY
      vintage: 2023-2024
    population_cagr_10yr:
      type: float
      unit: percent (annualized)
      description: ((population_2024 / population_2014)^(1/10) - 1) * 100.
      derived: yes
    anomaly_flags:
      type: string
      format: semicolon-separated codes
      values: [CROSS_COUNTY, LARGE_UNINC, RECENT_ANNEX_2020+, MULTI_DISTRICT, LOW_POP, RURAL_FRINGE, EDGE_ZIP, PO_BOX_ZIP, UNIQUE_ZIP]
      description: Codes documented in effort-0-narrative.md.
    in_scope_primary:
      type: boolean
      description: TRUE if ZCTA has >= 10% land area in either target county AND is not exclusively a PO-Box/unique-recipient ZIP.
    notes:
      type: string
      description: Free text annotation.

jurisdiction-crosswalk.csv:
  primary_key: jurisdiction
  description: Maps every city and unincorporated area in scope to its rental-regulatory authority.
  columns:
    jurisdiction:
      type: string
      description: Incorporated city name or "Unincorporated King" / "Unincorporated Snohomish".
    county:
      type: enum
      values: [King, Snohomish, Both]
    incorporated:
      type: boolean
    regulatory_authority:
      type: string
      description: Name of municipal code or county code that governs rental operations.
    code_citation:
      type: string
      description: Title/Chapter root for the rental-regulatory code (e.g., Seattle Municipal Code Title 22 and Title 14).
    notes:
      type: string

geojson_files:
  zip-boundaries.geojson:
    description: One FeatureCollection feature per in-scope ZCTA. Properties mirror zip-master.csv columns.
    geometry: MultiPolygon from Census TIGER/Line 2020 (TODO post-processing merge).
    status: Geometry NULL in this deliverable. Properties populated. See sibling README.
  district-boundaries.geojson:
    description: One feature per school district intersecting the in-scope ZIP universe.
    geometry: MultiPolygon from WA OSPI district boundaries (TODO post-processing merge).
    status: Geometry NULL in this deliverable. Properties populated. See sibling README.

code_lists:
  anomaly_flags:
    CROSS_COUNTY: ZCTA land spans more than one county. pct_land in the target counties may sum to < 1.00.
    LARGE_UNINC: Unincorporated share >= 0.50 of ZCTA land area.
    RECENT_ANNEX_2020+: City boundary changed after 2020-01-01; ZCTA-to-place mapping is stale.
    MULTI_DISTRICT: Three or more school districts intersect this ZCTA.
    LOW_POP: Population_2024 < 5,000. Statistical noise risk for downstream ZCTA-level rates.
    RURAL_FRINGE: Classification rural AND adjacent to forest/agricultural land outside any incorporated city.
    EDGE_ZIP: pct_land in target counties < 0.10 (auto-sets in_scope_primary = false).
    PO_BOX_ZIP: Postal ZIP is a PO-Box-only ZIP that maps to a containing ZCTA but has no separate ZCTA geometry.
    UNIQUE_ZIP: Postal ZIP is a unique-recipient ZIP (single building/employer); no ZCTA geometry.

vintage_summary:
  zcta_boundaries: Census TIGER/Line 2020 (5-digit ZCTA5).
  county_relationship: Census 2020 ZCTA-to-County relationship file.
  place_relationship: Census 2020 ZCTA-to-Place relationship file.
  population_2014: ACS 5-year 2010-2014 B01003 (TODO pull from Census API).
  population_2024: ACS 5-year 2019-2023 B01003 (TODO pull from Census API). World Population Review 2024 used as PUBLIC-PROXY in this draft.
  city_population_county_totals: WA OFM April 1, 2024 and 2025 estimates.
  school_districts: WA OSPI 2024-25 boundaries via NCES EDGE.
