name: deploy-pages

# Deploy the green-pm-site Astro app and brand-book HTML to GitHub Pages.
# Triggered on pushes to main that touch the site or brand-book sources.
on:
  push:
    branches: [main]
    paths:
      - 'src/green-pm-site/**'
      - 'product/branding/brand-book/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; cancel in-progress if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/green-pm-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/green-pm-site/package-lock.json

      - run: npm ci

      - name: Build site
        run: npm run build
        env:
          SITE_URL: https://klappe-pm.github.io/green-lappe-properties
          BASE_PATH: /green-lappe-properties

      - name: Copy brand-book into dist
        run: |
          mkdir -p dist/brand-book
          cp ../../product/branding/brand-book/*.html dist/brand-book/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/green-pm-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
