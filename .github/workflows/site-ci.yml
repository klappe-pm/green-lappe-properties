name: site-ci

# Build, type-check, and test the green-pm-site Astro app on changes under its
# directory. The IA workflow (ia.yml) governs repo information architecture;
# this one governs the site code.
on:
  push:
    branches: [main]
    paths:
      - 'src/green-pm-site/**'
      - '.github/workflows/site-ci.yml'
  pull_request:
    paths:
      - 'src/green-pm-site/**'
      - '.github/workflows/site-ci.yml'

defaults:
  run:
    working-directory: src/green-pm-site

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/green-pm-site/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
