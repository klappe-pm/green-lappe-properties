name: site-ci

# Build, type-check, unit/static-test, E2E (desktop + Android + iOS), and run
# Lighthouse budgets for the standalone Green Lappe Properties Astro app.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Lint (Biome)
        run: npm run lint
      - name: Type check
        run: npm run check
      - name: Unit tests + coverage (thresholds enforced)
        run: npm run test:coverage
      - name: Component tests (Astro container)
        run: npm run test:components
      - name: Static HTML tests
        run: npm run test:static
      - name: Build
        run: npm run build
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run E2E (desktop + Android + iOS)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload visual screenshots
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: visual-screenshots
          path: screenshots/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Lighthouse CI
        run: npx lhci autorun
